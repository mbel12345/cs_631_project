<!DOCTYPE html>
<html>

<head>
    <title>Make a Rental Agreement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>

<body>

    <div class="w-50 mx-auto p-4 border rounded bg-white shadow-sm">
        <h2>Welcome, {{ first_name }}!</h2>
        <h2>Please make a reservation</h2>
        <form method="post" action="/admin/new-rental" class="w-50 mx-auto mt-5 p-4 border rounded bg-white shadow-sm" id="rental-form">
            {% if request.query_params.get("success") %}
            <div class="alert alert-success">Rental created</div>
            {% endif %}
            {% if request.query_params.get("exists") %}
            <div class="alert alert-danger">Rental already exists.</div>
            {% endif %}
            {% if request.query_params.get("error") %}
            <div class="alert alert-danger">Rental failed. Please try again.</div>
            {% endif %}
            <label class="form-label">Reservation</label>
            <select name="reservation" class="form-select">
                {% for row in reservations %}
                <option value="{{ row.customer_name }} ~ {{ row.customer_address }} ~ {{ row.pickup_location_id}} ~ {{ row.pickup_date_time }}">
                    {{ row.customer_name }} - {{ row.customer_address }} - {{ row.pickup_location_id}} - {{ row.pickup_date_time }}
                </option>
                {% endfor %}
            </select>
            <label class="form-label">VIN</label>
            <select name="vin" class="form-select">
                {% for row in cars %}
                <option value="{{ row.vin }} ~ {{ row.location_id }} ~ {{ row.car_class }} ~ {{ row.make }} ~ {{ row.model }} ~ {{ row.year }}">
                    {{ row.vin }} - {{ row.location_id }} - {{ row.car_class }} - {{ row.make }} - {{ row.model }} - {{ row.year }}
                </option>
                {% endfor %}
            </select>
            <div class="mb-3">
                <label class="form-label">Start Date & Time</label>
                <input type="text" class="form-control" id="start_date_time" name="start_date_time">
            </div>
            <div class="mb-3">
                <label class="form-label">End Date & Time</label>
                <input type="text" class="form-control" id="end_date_time" name="end_date_time">
            </div>
            <div class="mb-3">
                <label class="form-label">Start Odometer Reading</label>
                <input type="number" name="start_odometer_reading" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">End Odometer Reading</label>
                <input type="number" name="end_odometer_reading" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">License State</label>
                <input type="text" name="license_state" class="form-control" minlength="2" maxlength="2">
            </div>
            <div class="mb-3">
                <label class="form-label">License Number</label>
                <input type="text" name="license_number" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">License Expiry Month</label>
                <input type="number" name="license_expiry_month" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">License Expiry Year</label>
                <input type="number" name="license_expiry_year" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Credit Card Type</label>
                <input type="text" name="credit_card_type" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Credit Card Number</label>
                <input type="text" name="credit_card_number" class="form-control" minlength="16" maxlength="16">
            </div>
            <div class="mb-3">
                <label class="form-label">Credit Card Expiry Month</label>
                <input type="number" name="credit_card_expiry_month" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Credit Card Expiry Year</label>
                <input type="number" name="credit_card_expiry_year" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Total Cost</label>
                <input type="number" name="total_cost" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>
    </div>
</body>

<script>

    document.addEventListener("DOMContentLoaded", function () {
        flatpickr("#start_date_time", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            time_24hr: false
        })
    });

    document.addEventListener("DOMContentLoaded", function () {
        flatpickr("#end_date_time", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            time_24hr: false
        })
    });

</script>

<script>

    document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("rental-form");

        form.addEventListener("submit", function (e) {
            let valid = true;

            // Select all inputs and selects inside the form
            const fields = form.querySelectorAll("input, select");

            fields.forEach(field => {
                if (field.value.trim() === "") {
                    valid = false;
                    field.classList.add("is-invalid");
                } else {
                    field.classList.remove("is-invalid");
                }
            });

            if (!valid) {
                e.preventDefault();
                alert("Please fill in all fields before submitting.");
            }
        });
    });

</script>

</html>
