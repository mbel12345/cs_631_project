<!DOCTYPE html>
<html>
<head>
    <title>All Reservations</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>
        .wide-container {
            padding-left: 15px;
            padding-right: 15px;
        }
        table {
            border-collapse: collapse;
            border-spacing: 0;
        }
        .table-responsive {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 78vh;
        }
        .table-responsive thead th {
            position: sticky;
            top: 0;
            background: #212529;
            color: white;
            z-index: 20;
        }

        .search-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .search-row .search-box {
            flex: 1;
        }

    </style>

</head>

<body class="bg-light">
    <div class="wide-container py-4">
        <h2 class="mb-4">All Reservations</h2>

        <!-- Search buttons -->
        <div class="row search-row g-3 mb-4">
            <div class="col-md-3 search-box">
                <label class="form-label">Customer</label>
                <input type="text" id="customer-search" class="form-control">
            </div>
            <div class="col-md-3 search-box">
                <label class="form-label">Location</label>
                <input type="text" id="location-search" class="form-control">
            </div>
            <div class="col-md-3 search-box">
                <label class="form-label">Pickup Time</label>
                <input type="text" id="pickup-start-search" class="form-control">
            </div>
            <div class="col-md-3 search-box">
                <label class="form-label">Return Time</label>
                <input type="text" id="pickup-end-search" class="form-control">
            </div>
            <div class="col-md-3 search-box">
                <label class="form-label">Search</label>
                <button type="submit" id="search-button" class="form-control btn btn-primary w-100">Search</button>
            </div>
        </div>

        <!-- Main table -->
        <div class="p-0">
            <div class="table-responsive">
                <table class="table table-striped table-bordered mb-0">
                    <thead class="table-dark">
                        <tr>
                            {% for header in headers %}
                                <th>{{ header.replace("_", " ") | title }}</th>
                            {% endfor %}
                        </tr>
                    </thead>
                    <tbody>
                        {% for reservation in reservations %}
                        <tr>
                            {% for value in reservation.values() %}
                                <td>{{ value }}</td>
                            {% endfor %}
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

<script>

    document.addEventListener("DOMContentLoaded", function () {
        flatpickr("#pickup-start-search", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            time_24hr: false
        })
    });

    document.addEventListener("DOMContentLoaded", function () {
        flatpickr("#pickup-end-search", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            time_24hr: false
        })
    });

</script>

<script>

    document.getElementById("search-button").addEventListener("click", async () => {

        const params = new URLSearchParams({
            customer: document.getElementById("customer-search").value.trim() || null,
            location: document.getElementById("location-search").value.trim() || null,
            pickup_start: document.getElementById("pickup-start-search").value.trim() || null,
            pickup_end: document.getElementById("pickup-end-search").value.trim() || null
        });
        window.location.href = "/admin/reservations?" + params.toString();
    });

</script>

</html>
