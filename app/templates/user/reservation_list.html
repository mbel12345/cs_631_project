<!DOCTYPE html>
<html>
<head>
    <title>All Reservations</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .wide-container {
            padding-left: 15px;
            padding-right: 15px;
        }
        table {
            border-collapse: collapse;
            border-spacing: 0;
        }
        .table-responsive {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 85vh;
        }
        .table-responsive thead th {
            position: sticky;
            top: 0;
            background: #212529;
            color: white;
            z-index: 20;
        }
    </style>

</head>

<body class="bg-light">
    <div class="wide-container py-4">
        <h2 class="mb-4">All Reservations</h2>
        <div class="p-0">
            <div class="table-responsive">
                <table class="table table-striped table-bordered mb-0">
                    <thead class="table-dark">
                        <tr>
                            {% for header in headers %}
                                <th>{{ header.replace("_", " ") | title }}</th>
                            {% endfor %}
                        </tr>
                    </thead>
                    <tbody>
                        {% for reservation in reservations %}
                        <tr>
                            {% for value in reservation.values() %}
                                <td>{{ value }}</td>
                            {% endfor %}
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
