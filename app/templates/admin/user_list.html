<!DOCTYPE html>
<html>
<head>
    <title>Admin - All Users</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .search-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .search-row .search-box {
            flex: 1;
        }
    </style>

</head>
<body class="bg-light">

<div class="container py-5">

    <h2 class="mb-4">All Users</h2>

    <!-- Search buttons -->
    <div class="row search-row g-3 mb-4">
        <div class="col-md-3 search-box">
            <label class="form-label">Username</label>
            <input type="text" id="username-search" class="form-control">
        </div>
        <div class="col-md-3 search-box">
            <label class="form-label">First Name</label>
            <input type="text" id="first-name-search" class="form-control">
        </div>
        <div class="col-md-3 search-box">
            <label class="form-label">Last Name</label>
            <input type="text" id="last-name-search" class="form-control">
        </div>
        <div class="col-md-3 search-box">
            <label class="form-label">Address</label>
            <input type="text" id="address-search" class="form-control">
        </div>
        <div class="col-md-3 search-box">
            <label class="form-label">Search</label>
            <button type="submit" id="search-button" class="form-control btn btn-primary w-100">Search</button>
        </div>
    </div>

    <!-- Main table -->
    <div class="card-body p-0">
        <table class="table table-striped mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Last Name</th>
                    <th>First Name</th>
                    <th>Address</th>
                    <th>Username</th>
                    <th>Admin?</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.last_name }}</td>
                    <td>{{ user.first_name }}</td>
                    <td>{{ user.address }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.is_admin }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>

<script>

    document.getElementById("search-button").addEventListener("click", async () => {

        const params = new URLSearchParams({
            username: document.getElementById("username-search").value.trim() || null,
            first_name: document.getElementById("first-name-search").value.trim() || null,
            last_name: document.getElementById("last-name-search").value.trim() || null,
            address: document.getElementById("address-search").value.trim() || null
        });
        window.location.href = "/admin/users?" + params.toString();
    });

</script>

</html>
